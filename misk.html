<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Миски | Muslim Shop Luxury</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c; --gold-light: #e8c96a; --dark: #050403;
            --dark-2: #0d0b08; --cream: #f0e8d5; --glass: rgba(8,6,3,0.92);
        }

        /* ТЕХНИЧЕСКИЙ ФИКС СКРОЛЛА */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { background: var(--dark); color: var(--cream); font-family: 'Cormorant Garamond', serif; overflow-x: hidden; width: 100%; -webkit-overflow-scrolling: touch; }
        body { padding-bottom: 130px; }
        
        /* СТАТИЧНЫЙ ФОН */
        body::before {
            content: ""; position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 30%, rgba(201,168,76,0.03) 0%, transparent 70%);
            pointer-events: none;
        }

        /* ══ HEADER ══ */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px 20px; background: rgba(5,4,3,0.95); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 200; border-bottom: 1px solid rgba(201,168,76,0.12);
        }
        .logo-small { font-family: 'Cinzel', serif; font-size: 0.9rem; letter-spacing: 4px; color: var(--gold-light); text-decoration: none; }
        .back-btn { color: var(--gold); text-decoration: none; font-size: 0.75rem; letter-spacing: 2px; font-family: 'Cinzel', serif; }

        /* Логика языков (переключатель есть только на главной, здесь язык применяется автоматически из localStorage) */
        .lang-kk { display: none; }
        body.kz-mode .lang-ru { display: none; }
        body.kz-mode .lang-kk { display: block; }

        .hero { padding: 32px 20px 24px; text-align: center; }
        .hero h1 { font-family: 'Cinzel', serif; font-size: 2.2rem; color: var(--gold); letter-spacing: 4px; font-weight: 400; }
        .hero p { color: var(--gold-light); font-size: 1rem; margin-top: 10px; font-style: italic; }

        .section { padding: 10px 14px; max-width: 1100px; margin: 0 auto; }

        /* ══ КАРТОЧКА ТОВАРА ══ */
        .product-card {
            background: var(--dark-2); border: 1px solid rgba(201,168,76,0.15);
            border-radius: 24px; overflow: hidden; margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
        }

        .img-container { 
            position: relative; width: 100%; height: 400px; 
            background: #000; overflow: hidden;
            touch-action: pan-y;
        }
        
        .img-container img { 
            width: 100%; height: 100%; 
            object-fit: contain; /* Чтобы флаконы были видны полностью */
            display: block; pointer-events: auto;
        }

        .info { padding: 20px; text-align: center; }
        .info h3 { font-family: 'Cinzel', serif; font-size: 1.4rem; color: var(--cream); margin-bottom: 10px; font-weight: 400; }
        .price { font-family: 'Cinzel', serif; color: var(--gold-light); font-size: 1.6rem; font-weight: 600; margin-bottom: 18px; }

        .desc-btn { background: none; border: 1px solid rgba(201,168,76,0.25); color: var(--gold); width: 100%; padding: 12px; border-radius: 12px; font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 2px; cursor: pointer; margin-bottom: 12px; }
        .desc-content { display: none; text-align: left; font-size: 0.95rem; color: rgba(240,232,213,0.7); line-height: 1.7; padding: 14px 4px; border-top: 1px solid rgba(201,168,76,0.1); margin-bottom: 14px; }

        .wa-btn {
            display: block; background: linear-gradient(135deg, #c9a84c 0%, #8a6a1e 100%);
            color: #000; padding: 18px; border-radius: 14px; text-decoration: none; text-align: center;
            font-family: 'Cinzel', serif; font-weight: 900; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase;
        }

        /* ══ NAV DOCK ══ */
        .nav-dock {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 40px); max-width: 380px; height: 70px;
            background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.07);
            border-radius: 36px; display: flex; justify-content: space-around; align-items: center; z-index: 8000;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
        }
        .nav-link { text-decoration: none; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 3px; min-width: 56px; }
        .nav-icon { font-size: 1.4rem; display: block; }
        .nav-label { font-size: 0.45rem; letter-spacing: 1.5px; color: var(--gold); text-transform: uppercase; font-family: 'Cinzel', serif; font-weight: bold; }
        .nav-link.active .nav-icon { filter: drop-shadow(0 0 8px var(--gold)); }

        /* ══ STORY VIEWER ══ */
        #story-viewer { display: none; position: fixed; inset: 0; background: #000; z-index: 9000; flex-direction: column; }
        .close-story { position: absolute; top: 34px; right: 18px; width: 40px; height: 40px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #fff; font-size: 24px; z-index: 9003; cursor: pointer; }
        #story-img { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body id="mainBody">

<header>
    <a href="index.html" class="logo-small">MUSLIM SHOP</a>
    <a href="index.html" class="back-btn"><span class="lang-ru">← НАЗАД</span><span class="lang-kk">← АРТҚА</span></a>
</header>

<section class="hero">
    <h1><span class="lang-ru">Миски (духи)</span><span class="lang-kk">Миски (әтірлер)</span></h1>
    <p>1 мг — 500 ₸</p>
</section>

<section class="section" id="product-list"></section>

<nav class="nav-dock">
    <a href="index.html" class="nav-link"><span class="nav-icon">🏠</span><span class="nav-label"><span class="lang-ru">Дом</span><span class="lang-kk">Басты</span></span></a>
    <a href="hits.html" class="nav-link"><span class="nav-icon">✨</span><span class="nav-label"><span class="lang-ru">Хиты</span><span class="lang-kk">Хиттер</span></span></a>
    <a href="tel:+77781754241" class="nav-link"><span class="nav-icon">📞</span><span class="nav-label"><span class="lang-ru">Связь</span><span class="lang-kk">Байланыс</span></span></a>
    <a href="https://wa.me/77781754241" class="nav-link"><span class="nav-icon">💬</span><span class="nav-label"><span class="lang-ru">Заказ</span><span class="lang-kk">Тапсырыс</span></span></a>
</nav>

<div id="story-viewer">
    <div class="close-story" onclick="closeStory()">×</div>
    <img id="story-img" src="">
</div>

<script>
const products = [
    { 
        name: "Ferdaus Cold", 
        img: "miski-1.jpg", 
        price: "500 ₸", 
        desc: "Свежий, кристально чистый аромат с ледяным оттенком. <br>• <b>Ноты:</b> Перечная мята, прохладный цитрус и легкие зеленые аккорды. <br>• <b>Ощущение:</b> Дарит мгновенное чувство свежести, идеально подходит для жаркого климата Атырау. <br>• <b>Стойкость:</b> Концентрированное масло сохраняет шлейф на весь день.",
        desc_kk: "Мұздай реңкі бар балғын, мөлдір хош иіс. <br>• <b>Ноттары:</b> Бұрыш жалбызы, салқын цитрус және жеңіл жасыл аккордтар. <br>• <b>Әсері:</b> Атыраудың ыстық климатына тамаша сәйкес келетін лездік балғындық сезімін сыйлайды. <br>• <b>Тұрақтылығы:</b> Концентрацияланған май иісті күні бойы сақтайды."
    },
    { 
        name: "Sheikh Shuyukh", 
        img: "miski-2.jpg", 
        price: "500 ₸", 
        desc: "Благородный восточный аромат для ценителей традиций. <br>• <b>Ноты:</b> Уд, сандаловое дерево, амбра и пряные специи. <br>• <b>Ощущение:</b> Глубокий, теплый и статусный аромат, подчеркивающий уверенность. <br>• <b>Применение:</b> Вечерний парфюм с богатым и сложным раскрытием.",
        desc_kk: "Дәстүрді бағалайтындарға арналған асыл шығыс хош иісі. <br>• <b>Ноттары:</b> Уд, сандал ағашы, амбра және хош иісті дәмдеуіштер. <br>• <b>Әсері:</b> Сенімділікті баса көрсететін терең, жылы және мәртебелі хош иіс. <br>• <b>Қолданылуы:</b> Бай әрі күрделі ашылатын кешкі парфюм."
    },
    { 
        name: "Antonio Banderas", 
        img: "miski-3.jpg", 
        price: "500 ₸", 
        desc: "Энергичный мужской аромат с современным характером. <br>• <b>Ноты:</b> Мускус, кожа, лесные ягоды и древесные ноты. <br>• <b>Ощущение:</b> Мужественный и притягательный аромат, который звучит свежо и бодро. <br>• <b>Стиль:</b> Универсальный выбор для повседневного использования.",
        desc_kk: "Заманауи мінезі бар қуатты ерлер хош иісі. <br>• <b>Ноттары:</b> Мускус, тері, орман жидектері және ағаш ноттары. <br>• <b>Әсері:</b> Балғын әрі сергек естілетін ерлі және тартымды хош иіс. <br>• <b>Стилі:</b> Күнделікті қолдануға арналған әмбебап таңдау."
    },
    { 
        name: "Louis Vuitton", 
        img: "miski-4.jpg", 
        price: "500 ₸", 
        desc: "Воплощение элегантности и французского шарма в масляном формате. <br>• <b>Ноты:</b> Нежная ваниль, бергамот, белый жасмин. <br>• <b>Ощущение:</b> Утонченный, «дорогой» и мягкий аромат с легким пудровым шлейфом. <br>• <b>Для кого:</b> Премиальный выбор для тех, кто любит изысканные парфюмерные композиции.",
        desc_kk: "Май форматындағы талғампаздық пен француз сүйкімділігінің көрінісі. <br>• <b>Ноттары:</b> Нәзік ваниль, бергамот, ақ жасмин. <br>• <b>Әсері:</b> Жеңіл пудра реңі бар нәзік, «қымбат» және жұмсақ хош иіс. <br>• <b>Кімге арналған:</b> Талғампаз парфюмерлік композицияларды жақсы көретіндерге арналған премиум таңдау."
    }
];

const list = document.getElementById('product-list');

products.forEach((p) => {
    const card = document.createElement('div');
    card.className = 'product-card';
    card.innerHTML = `
        <div class="img-container">
            <img src="${p.img}" alt="${p.name}" onclick="openStory('${p.img}')">
        </div>
        <div class="info">
            <h3>${p.name}</h3><div class="price">${p.price}</div>
            <button class="desc-btn"><span class="state-more"><span class="lang-ru">ПОДРОБНЕЕ ▾</span><span class="lang-kk">ТОЛЫҒЫРАҚ ▾</span></span><span class="state-less" style="display:none"><span class="lang-ru">СВЕРНУТЬ ▴</span><span class="lang-kk">ЖАБУ ▴</span></span></button>
            <div class="desc-content"><p class="lang-ru">${p.desc}</p><p class="lang-kk">${p.desc_kk}</p></div>
            <a href="https://wa.me/77781754241?text=${encodeURIComponent('Ассалямуалейкум! Я хочу заказать духи (миски): ' + p.name)}" class="wa-btn"><span class="lang-ru">ЗАКАЗАТЬ В WHATSAPP</span><span class="lang-kk">WHATSAPP АРҚЫЛЫ ТАПСЫРЫС БЕРУ</span></a>
        </div>`;

    list.appendChild(card);
    
    const btn = card.querySelector('.desc-btn');
    const content = card.querySelector('.desc-content');
    const stateMore = btn.querySelector('.state-more');
    const stateLess = btn.querySelector('.state-less');
    btn.addEventListener('click', () => {
        const open = content.style.display === 'block';
        content.style.display = open ? 'none' : 'block';
        stateMore.style.display = open ? 'block' : 'none';
        stateLess.style.display = open ? 'none' : 'block';
    });
});

const viewer = document.getElementById('story-viewer');
const storyImg = document.getElementById('story-img');

window.addEventListener('DOMContentLoaded', function() {
    if (localStorage.getItem('preferredLang') === 'kz') {
        document.getElementById('mainBody').classList.add('kz-mode');
    }
});

function openStory(src) {
    storyImg.src = src;
    viewer.style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function closeStory() {
    viewer.style.display = 'none';
    document.body.style.overflow = '';
}

// Закрытие по свайпу вниз
let startY = 0;
viewer.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
viewer.addEventListener('touchend', e => { if (e.changedTouches[0].clientY - startY > 80) closeStory(); }, { passive: true });
</script>
</body>
</html>
