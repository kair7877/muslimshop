<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТОП-5 ХИТЫ | Muslim Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&amp;family=Tenor+Sans&amp;display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c;
            --gold-light: #e8c96a;
            --dark: #0a0805;
            --dark-2: #120e08;
            --cream: #f5efe0;
            --text: #e8dfc8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); color: var(--text); font-family: 'Tenor Sans', sans-serif; line-height: 1.6; }

        header {
            padding: 1.2rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10,8,5,0.95);
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-family: 'Cinzel', serif; font-size: 1.1rem; color: var(--gold-light); letter-spacing: 2px; }

        .hero { padding: 3rem 1.5rem 1rem; text-align: center; }
        .hero h1 { font-family: 'Cinzel', serif; font-size: 2.2rem; color: var(--cream); letter-spacing: 3px; }
        .hero p { color: var(--gold); font-size: 1rem; margin-top: 10px; }

        .section { max-width: 1100px; margin: 0 auto; padding: 2rem 1rem; }

        /* КАРТОЧКА ХИТА */
        .hit-card {
            background: var(--dark-2);
            border: 1px solid rgba(201,168,76,0.2);
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 3rem;
            display: flex;
            flex-direction: column;
        }

        .hit-carousel { position: relative; width: 100%; height: 450px; background: #fff; }
        .hit-track { display: flex; width: 100%; height: 100%; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .hit-track::-webkit-scrollbar { display: none; }
        .hit-slide { min-width: 100%; height: 100%; scroll-snap-align: start; cursor: zoom-in; }
        .hit-slide img { width: 100%; height: 100%; object-fit: contain; }

        .hit-dots { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 20px 0; background: var(--dark-2); }
        .hit-dot { width: 7px; height: 7px; background: rgba(201, 168, 76, 0.2); border-radius: 50%; transition: 0.3s; }
        .hit-dot.active { background: var(--gold); width: 18px; border-radius: 10px; }

        .hit-info { padding: 10px 20px 30px; text-align: center; }
        .hit-info h2 { font-family: 'Cinzel', serif; font-size: 1.6rem; color: var(--cream); margin-bottom: 10px; }
        .hit-price { color: var(--gold-light); font-weight: 700; font-size: 1.8rem; margin-bottom: 20px; }
        
        .wa-btn {
            display: block; background: linear-gradient(135deg, var(--gold), #8a6a1e); color: var(--dark); 
            padding: 18px; border-radius: 12px; text-decoration: none; text-align: center; 
            font-weight: 800; font-size: 1rem; text-transform: uppercase;
        }

        .placeholder-card {
            border: 1px dashed rgba(201,168,76,0.3);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            color: rgba(232,223,200,0.3);
            margin-bottom: 2rem;
        }

        /* STORY VIEWER */
        #story-viewer {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; justify-content: center; align-items: center;
        }
        #story-viewer img { width: 100%; height: 100%; object-fit: contain; }
        .close-story {
            position: absolute; top: 30px; right: 20px; width: 44px; height: 44px; 
            background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; 
            justify-content: center; align-items: center; color: #fff; font-size: 30px;
        }

        .back { text-align: center; margin: 2rem 0; }
        .back a { color: var(--gold); text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <div class="logo">Muslim Shop</div>
    <a href="index.html" style="color: var(--gold); text-decoration: none;">← На главную</a>
</header>

<section class="hero">
    <h1>🔥 ТОП-5 ХИТЫ</h1>
    <p>Самые востребованные товары нашего магазина</p>
</section>

<section class="section">
    <!-- ХИТ 1: ECO DRY -->
    <div class="hit-card">
        <div class="hit-carousel">
            <div class="hit-track" id="track1">
                <div class="hit-slide" onclick="openStory('ecodry_1.jpg')"><img src="ecodry_1.jpg"></div>
                <div class="hit-slide" onclick="openStory('ecodry_2.jpg')"><img src="ecodry_2.jpg"></div>
                <div class="hit-slide" onclick="openStory('ecodry_3.jpg')"><img src="ecodry_3.jpg"></div>
                <div class="hit-slide" onclick="openStory('ecodry_4.jpg')"><img src="ecodry_4.jpg"></div>
                <div class="hit-slide" onclick="openStory('ecodry_5.jpg')"><img src="ecodry_5.jpg"></div>
            </div>
        </div>
        <div class="hit-dots" id="dots1">
            <div class="hit-dot active"></div><div class="hit-dot"></div><div class="hit-dot"></div><div class="hit-dot"></div><div class="hit-dot"></div>
        </div>
        <div class="hit-info">
            <h2>Eco Dry Спрей</h2>
            <p style="font-size: 0.8rem; color: rgba(232,223,200,0.5); margin-bottom: 10px;">Нажмите на фото для просмотра во весь экран</p>
            <div class="hit-price">4 000 ₸</div>
            <a href="https://wa.me/77781754241?text=Хочу%20заказать%20Eco%20Dry" class="wa-btn">ЗАКАЗАТЬ В WHATSAPP</a>
        </div>
    </div>

    <!-- МЕСТО ДЛЯ БУДУЩИХ ХИТОВ -->
    <div class="placeholder-card">Здесь скоро появится следующий хит...</div>
</section>

<div class="back"><a href="index.html">← ВЕРНУТЬСЯ НА ГЛАВНУЮ</a></div>

<div id="story-viewer">
    <div class="close-story" onclick="closeStory()">&times;</div>
    <img id="story-img" src="">
</div>

<script>
    function setupCarousel(trackId, dotsId) {
        const track = document.getElementById(trackId);
        const dots = document.querySelectorAll(`#${dotsId} .hit-dot`);
        if(!track || dots.length === 0) return;
        track.addEventListener('scroll', () => {
            const index = Math.round(track.scrollLeft / track.offsetWidth);
            dots.forEach((dot, i) => { dot.classList.toggle('active', i === index); });
        });
    }
    setupCarousel('track1', 'dots1');

    function openStory(src) {
        const viewer = document.getElementById('story-viewer');
        const img = document.getElementById('story-img');
        img.src = src; viewer.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }
    function closeStory() {
        document.getElementById('story-viewer').style.display = 'none';
        document.body.style.overflow = 'auto';
    }
</script>

</body>
</html>
