<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Хиты | Muslim Shop Luxury</title>
    
    <!-- Элитные шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Tenor+Sans&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #c9a84c; --gold-light: #e8c96a; --dark: #050504;
            --dark-2: #0e0d0a; --cream: #f0e8d5; --glass: rgba(10, 8, 5, 0.92);
        }

        /* ТЕХНИЧЕСКИЙ ФИКС СКРОЛЛА */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            background: var(--dark); color: var(--cream); 
            font-family: 'Tenor Sans', sans-serif; 
            overflow-x: hidden; width: 100%;
            -webkit-overflow-scrolling: touch;
        }
        body { padding-bottom: 130px; }

        /* Мягкий фон с золотым свечением */
        body::before {
            content: ""; position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 30%, #1a150c 0%, var(--dark) 70%);
        }

        header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(5,5,5,0.95); position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid rgba(201,168,76,0.12);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .logo-small { font-family: 'Cinzel Decorative', serif; font-size: 1rem; color: var(--gold-light); letter-spacing: 3px; text-decoration: none; }
        .back-btn { color: var(--gold); text-decoration: none; font-size: 0.75rem; font-family: 'Tenor Sans', sans-serif; letter-spacing: 2px; font-weight: bold; }

        /* Логика языков (переключатель есть только на главной, здесь язык применяется автоматически из localStorage) */
        .lang-kk { display: none; }
        body.kz-mode .lang-ru { display: none; }
        body.kz-mode .lang-kk { display: block; }

        .hero { padding: 40px 20px 20px; text-align: center; }
        .hero h1 { 
            font-family: 'Playfair Display', serif; font-size: 3rem; 
            color: var(--gold); font-weight: 400; font-style: italic;
        }

        .section { max-width: 1100px; margin: 0 auto; padding: 1rem; }

        /* КАРТОЧКА ХИТА */
        .product-card {
            background: var(--dark-2); border: 1px solid rgba(201,168,76,0.15);
            border-radius: 30px; overflow: hidden; margin-bottom: 4rem;
            display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .carousel-box { 
            position: relative; width: 100%; height: 500px; background: #000; overflow: hidden;
            touch-action: pan-y;
        }
        
        .track { 
            display: flex; width: 100%; height: 100%; overflow-x: auto; 
            scroll-snap-type: x mandatory; scrollbar-width: none; touch-action: pan-x pan-y; 
        }
        .track::-webkit-scrollbar { display: none; }
        
        .slide { min-width: 100%; height: 100%; scroll-snap-align: start; flex-shrink: 0; }
        .slide img { width: 100%; height: 100%; object-fit: contain; display: block; pointer-events: none; }

        .dots { display: flex; justify-content: center; gap: 8px; padding: 20px 0; background: var(--dark-2); }
        .dot { width: 7px; height: 7px; background: rgba(201, 168, 76, 0.2); border-radius: 50%; transition: 0.3s; }
        .dot.active { background: var(--gold); width: 20px; border-radius: 10px; }

        .info { padding: 10px 25px 35px; text-align: center; }
        .info h2 { font-family: 'Cinzel Decorative', serif; font-size: 1.6rem; color: #fff; margin-bottom: 10px; letter-spacing: 2px; }
        .price { color: var(--gold-light); font-weight: 700; font-size: 1.8rem; margin-bottom: 25px; font-family: 'Playfair Display', serif; }
        
        /* КНОПКА ПОДРОБНЕЕ */
        .desc-btn {
            background: none; border: 1px solid rgba(201,168,76,0.3); color: var(--gold);
            width: 100%; padding: 12px; border-radius: 15px; font-family: 'Tenor Sans', sans-serif;
            font-size: 0.75rem; cursor: pointer; margin-bottom: 15px; letter-spacing: 2px;
        }
        .desc-content { display: none; text-align: left; font-size: 0.95rem; color: rgba(232,223,200,0.7); line-height: 1.6; padding: 15px 5px; border-top: 1px solid rgba(201,168,76,0.1); margin-bottom: 15px; }

        .wa-btn {
            display: block; background: linear-gradient(135deg, var(--gold), #8a6a1e); color: #000; 
            padding: 18px; border-radius: 15px; text-decoration: none; text-align: center; 
            font-weight: 900; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px;
        }

        /* НИЖНЕЕ МЕНЮ (DOCK) */
        .nav-dock {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; height: 75px;
            background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 40px;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 4000; box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }
        .nav-link { text-decoration: none; text-align: center; color: var(--cream); opacity: 0.5; transition: 0.4s; }
        .nav-link.active { opacity: 1; color: var(--gold-light); }
        .nav-icon { font-size: 1.5rem; display: block; margin-bottom: 2px; }
        .nav-label { font-size: 0.5rem; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); font-weight: bold; }

        /* STORY VIEWER */
        #story-viewer { display: none; position: fixed; inset: 0; background: #000; z-index: 5000; flex-direction: column; }
        .story-progress { position: absolute; top: 15px; left: 10px; right: 10px; display: flex; gap: 5px; }
        .story-bar { height: 3px; flex: 1; background: rgba(255,255,255,0.3); border-radius: 2px; }
        .story-fill { height: 100%; width: 0%; background: #fff; }
        .close-story { position: absolute; top: 35px; right: 20px; width: 40px; height: 40px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #fff; font-size: 24px; z-index: 5003; }
        .story-track { display: flex; width: 100%; height: 100%; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .story-slide { min-width: 100%; height: 100%; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; }
        .story-slide img { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body id="mainBody">

    <header>
        <a href="index.html" class="logo-small">MUSLIM SHOP</a>
        <a href="index.html" class="back-btn"><span class="lang-ru">← НАЗАД</span><span class="lang-kk">← АРТҚА</span></a>
    </header>

    <section class="hero">
        <h1>Bestsellers</h1>
    </section>

    <section class="section" id="hits-list"></section>

    <!-- НИЖНЕЕ МЕНЮ -->
    <nav class="nav-dock">
        <a href="index.html" class="nav-link"><span class="nav-icon">🏠</span><label class="nav-label"><span class="lang-ru">Дом</span><span class="lang-kk">Басты</span></label></a>
        <a href="hits.html" class="nav-link active"><span class="nav-icon">✨</span><label class="nav-label"><span class="lang-ru">Хиты</span><span class="lang-kk">Хиттер</span></label></a>
        <a href="tel:+77781754241" class="nav-link"><span class="nav-icon">📞</span><label class="nav-label"><span class="lang-ru">Связь</span><span class="lang-kk">Байланыс</span></label></a>
        <a href="https://wa.me/77781754241" class="nav-link"><span class="nav-icon">💬</span><label class="nav-label"><span class="lang-ru">Заказ</span><span class="lang-kk">Тапсырыс</span></label></a>
    </nav>

    <div id="story-viewer">
        <div class="story-progress" id="story-progress"></div>
        <div class="close-story" onclick="closeStory()">×</div>
        <div class="story-track" id="story-track"></div>
    </div>

    <script>
        const hits = [
            { name: "Eco Dry Спрей", price: "4 000 ₸", prefix: "ecodry", desc: "Универсальный натуральный антиперспирант. Одно нанесение блокирует потоотделение на срок до 7 дней. Не оставляет пятен и безопасен для кожи.",
              desc_kk: "Әмбебап табиғи антиперспирант. Бір рет жағу терлеуді 7 күнге дейін тоқтатады. Дақ қалдырмайды және теріге қауіпсіз." },
            { name: "STOP Аллергия", price: "6 000 ₸", prefix: "allergy", desc: "Растительный комплекс для борьбы с симптомами аллергии. Натуральный сбор эффективно снимает заложенность и зуд.",
              desc_kk: "Аллергия белгілерімен күресуге арналған өсімдік кешені. Табиғи жинақ мұрын бітелуі мен қышуды тиімді басады." },
            { name: "Aller Stop Спрей", price: "5 000 ₸", prefix: "allerstop", desc: "Назальный спрей мгновенного действия. Создает защитный барьер, препятствуя попаданию аллергенов в организм.",
              desc_kk: "Лездік әсер ететін мұрын спрейі. Аллергендердің ағзаға түсуіне кедергі болатын қорғаныш тосқауыл жасайды." },
            { name: "Эмиз Виноградный", price: "16 000 ₸", prefix: "emiz", desc: "Элитный концентрированный напиток. Мощный источник антиоксидантов и витаминов для вашего иммунитета.",
              desc_kk: "Элиталық концентрацияланған сусын. Иммунитетіңіз үшін антиоксиданттар мен дәрумендердің қуатты көзі." },
            { name: "GOLD 07 — Паста", price: "5 500 ₸", prefix: "gold07", desc: "Легендарная турецкая медовая паста. Натуральный афродизиак, повышающий выносливость и тонус.",
              desc_kk: "Аңызға айналған түрік бал пастасы. Төзімділік пен тонусты арттыратын табиғи афродизиак." }
        ];

        const container = document.getElementById('hits-list');

        hits.forEach((h, index) => {
            const images = [1,2,3,4,5].map(i => `${h.prefix}_${i}.jpg`);
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <div class="carousel-box">
                    <div class="track">
                        ${images.map((img, idx) => `<div class="slide" onclick='openStory(${JSON.stringify(images)}, ${idx})'><img src="${img}" onerror="if(this.src.includes('_1'))this.src='placeholder.jpg';else this.parentElement.style.display='none';"></div>`).join('')}
                    </div>
                </div>
                <div class="dots">${images.map((_, i) => `<div class="dot ${i===0?'active':''}"></div>`).join('')}</div>
                <div class="info">
                    <h2>${h.name}</h2>
                    <div class="price">${h.price}</div>
                    <button class="desc-btn" onclick="toggleDesc(this)"><span class="state-more"><span class="lang-ru">ПОДРОБНЕЕ ▾</span><span class="lang-kk">ТОЛЫҒЫРАҚ ▾</span></span><span class="state-less" style="display:none"><span class="lang-ru">СВЕРНУТЬ ▴</span><span class="lang-kk">ЖАБУ ▴</span></span></button>
                    <div class="desc-content"><p class="lang-ru">${h.desc}</p><p class="lang-kk">${h.desc_kk}</p></div>
                    <a href="https://wa.me/77781754241?text=Хочу%20заказать%20ХИТ:%20${encodeURIComponent(h.name)}" class="wa-btn"><span class="lang-ru">ЗАКАЗАТЬ</span><span class="lang-kk">ТАПСЫРЫС БЕРУ</span></a>
                </div>
            `;
            container.appendChild(card);
            const track = card.querySelector('.track');
            const dots = card.querySelectorAll('.dot');
            track.addEventListener('scroll', () => {
                const idx = Math.round(track.scrollLeft / track.offsetWidth);
                dots.forEach((dot, i) => dot.classList.toggle('active', i === idx));
            }, { passive: true });
        });

        function toggleDesc(btn) {
            const content = btn.nextElementSibling;
            const isOpen = content.style.display === 'block';
            content.style.display = isOpen ? 'none' : 'block';
            const stateMore = btn.querySelector('.state-more');
            const stateLess = btn.querySelector('.state-less');
            stateMore.style.display = isOpen ? 'block' : 'none';
            stateLess.style.display = isOpen ? 'none' : 'block';
        }

        window.addEventListener('DOMContentLoaded', function() {
            if (localStorage.getItem('preferredLang') === 'kz') {
                document.getElementById('mainBody').classList.add('kz-mode');
            }
        });

        const viewer = document.getElementById('story-viewer');
        const storyTrack = document.getElementById('story-track');
        let startY = 0;
        function openStory(images, start) {
            storyTrack.innerHTML = ''; document.getElementById('story-progress').innerHTML = '';
            images.forEach((src) => {
                const slide = document.createElement('div'); slide.className = 'story-slide';
                slide.innerHTML = `<img src="${src}">`; storyTrack.appendChild(slide);
                const bar = document.createElement('div'); bar.className = 'story-bar';
                bar.innerHTML = `<div class="story-fill"></div>`; document.getElementById('story-progress').appendChild(bar);
            });
            viewer.style.display = 'flex'; document.body.style.overflow = 'hidden';
            setTimeout(() => { storyTrack.scrollLeft = storyTrack.offsetWidth * start; updateStoryUI(); }, 50);
        }
        function updateStoryUI() {
            const index = Math.round(storyTrack.scrollLeft / storyTrack.offsetWidth);
            document.querySelectorAll('.story-fill').forEach((f, i) => { f.style.width = i <= index ? '100%' : '0%'; f.style.opacity = i === index ? '1' : (i < index ? '0.6' : '0.3'); });
        }
        storyTrack.addEventListener('scroll', updateStoryUI, { passive: true });
        function closeStory() { viewer.style.display = 'none'; document.body.style.overflow = ''; }
        viewer.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
        viewer.addEventListener('touchend', e => { if (e.changedTouches[0].clientY - startY > 80) closeStory(); }, { passive: true });
    </script>
</body>
</html>
