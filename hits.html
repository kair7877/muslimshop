<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ТОП-5 ХИТЫ | Muslim Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&amp;family=Tenor+Sans&amp;display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c; --gold-light: #e8c96a; --dark: #0a0805;
            --dark-2: #120e08; --cream: #f5efe0; --text: #e8dfc8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--dark); 
            color: var(--text); 
            font-family: 'Tenor Sans', sans-serif; 
            line-height: 1.6; 
            overflow-x: hidden; 
            width: 100%;
        }

        header {
            padding: 1.2rem 1.5rem; display: flex; justify-content: space-between; align-items: center;
            background: rgba(10,8,5,0.95); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(201,168,76,0.1);
        }
        .logo { font-family: 'Cinzel', serif; font-size: 1.1rem; color: var(--gold-light); letter-spacing: 2px; text-decoration: none; }
        .hero { padding: 3rem 1.5rem 1rem; text-align: center; }
        .hero h1 { font-family: 'Cinzel', serif; font-size: 2.2rem; color: var(--cream); letter-spacing: 3px; }

        .section { max-width: 1100px; margin: 0 auto; padding: 1rem; }

        /* КАРТОЧКА ХИТА */
        .hit-card {
            background: var(--dark-2); border: 1px solid rgba(201,168,76,0.2);
            border-radius: 24px; overflow: hidden; margin-bottom: 3.5rem;
            display: flex; flex-direction: column; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .carousel-box { 
            position: relative; width: 100%; height: 500px; background: #000; overflow: hidden;
            touch-action: pan-y;
        }
        
        .carousel-box::after {
            content: ''; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(201,168,76,0.05), transparent);
            transform: skewX(-25deg); animation: shimmer 8s infinite; pointer-events: none;
        }
        @keyframes shimmer { 0% { left: -150%; } 20% { left: 150%; } 100% { left: 150%; } }

        .track { 
            display: flex; width: 100%; height: 100%; overflow-x: auto; 
            scroll-snap-type: x mandatory; scrollbar-width: none;
            touch-action: auto; 
        }
        .track::-webkit-scrollbar { display: none; }
        
        .slide { min-width: 100%; height: 100%; scroll-snap-align: start; position: relative; }
        .slide img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .dots { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 18px 0; background: var(--dark-2); }
        .dot { width: 7px; height: 7px; background: rgba(201, 168, 76, 0.2); border-radius: 50%; transition: 0.3s; }
        .dot.active { background: var(--gold); width: 18px; border-radius: 10px; }

        .info { padding: 10px 20px 30px; text-align: center; background: var(--dark-2); }
        .info h2 { font-family: 'Cinzel', serif; font-size: 1.6rem; color: var(--cream); margin-bottom: 10px; }
        .price { color: var(--gold-light); font-weight: 700; font-size: 1.8rem; margin-bottom: 25px; }
        
        .wa-btn {
            display: block; background: linear-gradient(135deg, var(--gold), #8a6a1e); color: var(--dark); 
            padding: 18px; border-radius: 12px; text-decoration: none; text-align: center; 
            font-weight: 800; font-size: 1rem; text-transform: uppercase;
        }

        #story-viewer { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 3000; flex-direction: column; 
        }
        .story-progress { position: absolute; top: 15px; left: 10px; right: 10px; display: flex; gap: 5px; z-index: 3002; }
        .story-bar { height: 3px; flex: 1; background: rgba(255,255,255,0.3); border-radius: 2px; }
        .story-fill { height: 100%; width: 0%; background: #fff; }
        .close-story { 
            position: absolute; top: 35px; right: 20px; width: 44px; height: 44px; 
            background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; 
            justify-content: center; align-items: center; color: #fff; font-size: 30px; z-index: 3003; 
        }
        .story-track { display: flex; width: 100%; height: 100%; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .story-slide { min-width: 100%; height: 100%; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; }
        .story-slide img { width: 100%; height: 100%; object-fit: contain; }

        .back { text-align: center; margin: 3rem 0; }
        .back a { color: var(--gold); text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">MUSLIM SHOP</a>
    <a href="index.html" style="color: var(--gold); text-decoration: none;">← Главная</a>
</header>

<section class="hero"><h1>🔥 ТОП-5 ХИТЫ</h1></section>

<section class="section" id="hits-list">
    <!-- Товары -->
</section>

<div class="back"><a href="index.html">← ВЕРНУТЬСЯ НА ГЛАВНУЮ</a></div>

<div id="story-viewer">
    <div class="story-progress" id="story-progress"></div>
    <div class="close-story" onclick="closeStory()">&times;</div>
    <div class="story-track" id="story-track"></div>
</div>

<script>
    const hits = [
        { name: "Eco Dry Спрей", price: "4 000 ₸", prefix: "ecodry" },
        { name: "STOP Аллергия", price: "6 000 ₸", prefix: "allergy" },
        { name: "Aller Stop Спрей", price: "5 000 ₸", prefix: "allerstop" },
        { name: "Эмиз Виноградный", price: "16 000 ₸", prefix: "emiz" },
        { name: "GOLD 07 — Паста", price: "5 500 ₸", prefix: "gold07" }
    ];

    const hitsList = document.getElementById('hits-list');

    hits.forEach((h, index) => {
        const images = [`${h.prefix}_1.jpg`, `${h.prefix}_2.jpg`, `${h.prefix}_3.jpg`, `${h.prefix}_4.jpg`, `${h.prefix}_5.jpg` ];
        const card = document.createElement('div');
        card.className = 'hit-card';
        card.innerHTML = `
            <div class="carousel-box">
                <div class="track">
                    ${images.map((img, idx) => `
                        <div class="slide">
                            <img src="${img}" onclick='openStory(${JSON.stringify(images)}, ${idx})' onerror="this.src='${h.prefix}_1.jpg'; if(this.src.includes('_2')||this.src.includes('_3')) this.parentElement.style.display='none';">
                        </div>
                    `).join('')}
                </div>
            </div>
            <div class="dots">
                ${images.map((_, i) => `<div class="dot ${i===0?'active':''}"></div>`).join('')}
            </div>
            <div class="info">
                <h2>${h.name}</h2>
                <div class="price">${h.price}</div>
                <a href="https://wa.me/77781754241?text=%D0%90%D1%81%D1%81%D0%B0%D0%BB%D1%8F%D0%BC%D1%83%20%D0%B0%D0%BB%D0%B5%D0%B9%D0%BA%D1%83%D0%BC!%20%D0%AF%20%D1%85%D0%BE%D1%87%D1%83%20%D0%B7%D0%B0%D0%BA%D0%B0%D0%B7%D0%B0%D1%82%D1%8C%20%D0%A5%D0%98%D0%A2%20%D0%9F%D0%A0%D0%9E%D0%94%D0%90%D0%96:%20${encodeURIComponent(h.name)}" class="wa-btn">ЗАКАЗАТЬ</a>
            </div>
        `;
        hitsList.appendChild(card);

        const track = card.querySelector('.track');
        const dots = card.querySelectorAll('.dot');
        track.addEventListener('scroll', () => {
            const idx = Math.round(track.scrollLeft / track.offsetWidth);
            dots.forEach((dot, i) => dot.classList.toggle('active', i === idx));
        });
    });

    const viewer = document.getElementById('story-viewer');
    const storyTrack = document.getElementById('story-track');
    const progressContainer = document.getElementById('story-progress');

    function openStory(images, startIndex) {
        storyTrack.innerHTML = ''; progressContainer.innerHTML = '';
        images.forEach((src) => {
            const slide = document.createElement('div'); slide.className = 'story-slide';
            slide.innerHTML = `<img src="${src}">`; storyTrack.appendChild(slide);
            const bar = document.createElement('div'); bar.className = 'story-bar';
            bar.innerHTML = `<div class="story-fill"></div>`; progressContainer.appendChild(bar);
        });
        viewer.style.display = 'flex'; document.body.style.overflow = 'hidden';
        setTimeout(() => { storyTrack.scrollLeft = storyTrack.offsetWidth * startIndex; updateStoryUI(); }, 50);
    }

    function updateStoryUI() {
        const index = Math.round(storyTrack.scrollLeft / storyTrack.offsetWidth);
        const fills = document.querySelectorAll('.story-fill');
        fills.forEach((fill, i) => {
            fill.style.width = i <= index ? '100%' : '0%';
            fill.style.opacity = i === index ? '1' : (i < index ? '0.6' : '0.3');
        });
    }

    storyTrack.addEventListener('scroll', updateStoryUI);
    function closeStory() { viewer.style.display = 'none'; document.body.style.overflow = 'auto'; }
</script>
</body>
</html>
