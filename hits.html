<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТОП-5 ХИТЫ | Muslim Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&amp;family=Tenor+Sans&amp;display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c;
            --gold-light: #e8c96a;
            --dark: #0a0805;
            --dark-2: #120e08;
            --cream: #f5efe0;
            --text: #e8dfc8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); color: var(--text); font-family: 'Tenor Sans', sans-serif; line-height: 1.6; overflow-x: hidden; }

        header {
            padding: 1.2rem 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(10,8,5,0.95); position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid rgba(201,168,76,0.1);
        }
        .logo { font-family: 'Cinzel', serif; font-size: 1.1rem; color: var(--gold-light); letter-spacing: 2px; text-decoration: none; }

        .hero { padding: 3rem 1.5rem 1rem; text-align: center; }
        .hero h1 { font-family: 'Cinzel', serif; font-size: 2.2rem; color: var(--cream); letter-spacing: 3px; }

        .section { max-width: 1100px; margin: 0 auto; padding: 1rem; }

        /* КАРТОЧКА ХИТА */
        .hit-card {
            background: var(--dark-2); border: 1px solid rgba(201,168,76,0.2);
            border-radius: 24px; overflow: hidden; margin-bottom: 4rem;
            display: flex; flex-direction: column;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .hit-carousel { 
            position: relative; width: 100%; height: 500px; 
            background: #000; /* ЧЕРНЫЙ ФОН ВМЕСТО БЕЛОГО */
            overflow: hidden;
        }

        /* Эффект мерцания (глянец) */
        .hit-carousel::after {
            content: ''; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(201,168,76,0.05), transparent);
            transform: skewX(-25deg); animation: shimmer 8s infinite; pointer-events: none;
        }
        @keyframes shimmer { 0% { left: -150%; } 20% { left: 150%; } 100% { left: 150%; } }

        /* Подсказка "Листайте" */
        .swipe-hint {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(0, 0, 0, 0.5); color: var(--gold);
            padding: 8px 15px; border-radius: 50px; font-size: 0.7rem;
            font-family: 'Cinzel', serif; border: 1px solid var(--gold);
            backdrop-filter: blur(5px); z-index: 10; pointer-events: none;
            animation: breath 2.5s infinite ease-in-out; transition: opacity 0.5s;
        }
        @keyframes breath { 0%, 100% { transform: translateX(0); opacity: 0.7; } 50% { transform: translateX(-10px); opacity: 1; } }
        .swipe-hint.hidden { opacity: 0; }

        .hit-track { 
            display: flex; width: 100%; height: 100%; 
            overflow-x: auto; scroll-snap-type: x mandatory; 
            scrollbar-width: none;
        }
        .hit-track::-webkit-scrollbar { display: none; }
        
        .hit-slide { min-width: 100%; height: 100%; scroll-snap-align: start; cursor: zoom-in; }
        .hit-slide img { 
            width: 100%; height: 100%; 
            object-fit: cover; /* КАРТИНКА ЗАПОЛНЯЕТ ВСЁ МЕСТО */
        }

        .hit-dots { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 20px 0; background: var(--dark-2); }
        .hit-dot { width: 7px; height: 7px; background: rgba(201, 168, 76, 0.2); border-radius: 50%; transition: 0.3s; }
        .hit-dot.active { background: var(--gold); width: 18px; border-radius: 10px; }

        .hit-info { padding: 10px 20px 30px; text-align: center; background: var(--dark-2); }
        .hit-info h2 { font-family: 'Cinzel', serif; font-size: 1.6rem; color: var(--cream); margin-bottom: 10px; }
        .hit-price { color: var(--gold-light); font-weight: 700; font-size: 1.8rem; margin-bottom: 20px; }
        
        .wa-btn {
            display: block; background: linear-gradient(135deg, var(--gold), #8a6a1e); color: var(--dark); 
            padding: 18px; border-radius: 12px; text-decoration: none; text-align: center; 
            font-weight: 800; font-size: 1rem; text-transform: uppercase;
        }

        /* --- ПОЛНОЭКРАННЫЙ РЕЖИМ --- */
        #story-viewer {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; flex-direction: column;
        }
        .story-progress-container { position: absolute; top: 15px; left: 10px; right: 10px; display: flex; gap: 5px; z-index: 2002; }
        .story-progress-bar { height: 3px; flex: 1; background: rgba(255,255,255,0.3); border-radius: 2px; overflow: hidden; }
        .story-progress-fill { height: 100%; width: 0%; background: #fff; }
        .close-story {
            position: absolute; top: 35px; right: 20px; width: 44px; height: 44px; 
            background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; 
            justify-content: center; align-items: center; color: #fff; font-size: 30px; cursor: pointer; z-index: 2003;
        }
        .story-track { display: flex; width: 100%; height: 100%; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .story-track::-webkit-scrollbar { display: none; }
        .story-slide { min-width: 100%; height: 100%; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; }
        .story-slide img { width: 100%; height: 100%; object-fit: contain; }

        .back { text-align: center; margin: 2rem 0; }
        .back a { color: var(--gold); text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>

                <div class="hit-slide" onclick="openStory(['ecodry_1.jpg','ecodry_2.jpg','ecodry_3.jpg','ecodry_4.jpg','ecodry_5.jpg'], 2)"><img src="ecodry_3.jpg"></div>
                <div class="hit-slide" onclick="openStory(['ecodry_1.jpg','ecodry_2.jpg','ecodry_3.jpg','ecodry_4.jpg','ecodry_5.jpg'], 3)"><img src="ecodry_4.jpg"></div>
                <div class="hit-slide" onclick="openStory(['ecodry_1.jpg','ecodry_2.jpg','ecodry_3.jpg','ecodry_4.jpg','ecodry_5.jpg'], 4)"><img src="ecodry_5.jpg"></div>

<div id="story-viewer">
    <div class="story-progress-container" id="story-progress"></div>
    <div class="close-story" onclick="closeStory()">&times;</div>
    <div class="story-track" id="story-track"></div>
</div>

<script>
    function setupCarousel(trackId, dotsId, hintId) {
        const track = document.getElementById(trackId);
        const dots = document.querySelectorAll(`#${dotsId} .hit-dot`);
        const hint = document.getElementById(hintId);
        if(!track) return;

        setTimeout(() => {
            track.scrollTo({ left: 30, behavior: 'smooth' });
            setTimeout(() => track.scrollTo({ left: 0, behavior: 'smooth' }), 500);
        }, 1500);

        track.addEventListener('scroll', () => {
            const index = Math.round(track.scrollLeft / track.offsetWidth);
            dots.forEach((dot, i) => dot.classList.toggle('active', i === index));
            if (track.scrollLeft > 20 && hint) hint.classList.add('hidden');
        });
    }

    setupCarousel('track1', 'dots1', 'hint1');
    setupCarousel('track2', 'dots2', 'hint2');

    const viewer = document.getElementById('story-viewer');
    const storyTrack = document.getElementById('story-track');
    const progressContainer = document.getElementById('story-progress');

    function openStory(images, startIndex) {
        storyTrack.innerHTML = ''; progressContainer.innerHTML = '';
        images.forEach((src, i) => {
            const slide = document.createElement('div'); slide.className = 'story-slide';
            slide.innerHTML = `<img src="${src}">`; storyTrack.appendChild(slide);
            const bar = document.createElement('div'); bar.className = 'story-progress-bar';
            bar.innerHTML = `<div class="story-progress-fill"></div>`; progressContainer.appendChild(bar);
        });
        viewer.style.display = 'flex'; document.body.style.overflow = 'hidden';
        setTimeout(() => { storyTrack.scrollLeft = storyTrack.offsetWidth * startIndex; updateStoryUI(); }, 50);
    }

    function updateStoryUI() {
        const index = Math.round(storyTrack.scrollLeft / storyTrack.offsetWidth);
        const fills = document.querySelectorAll('.story-progress-fill');
        fills.forEach((fill, i) => {
            fill.style.width = i <= index ? '100%' : '0%';
            fill.style.opacity = i === index ? '1' : (i < index ? '0.6' : '0.3');
        });
    }

    storyTrack.addEventListener('scroll', updateStoryUI);
    function closeStory() { viewer.style.display = 'none'; document.body.style.overflow = 'auto'; }
</script>
