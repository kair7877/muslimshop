<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nutraxin | Muslim Shop Luxury</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c; --gold-light: #e8c96a; --dark: #050403;
            --dark-2: #0d0b08; --cream: #f0e8d5; --glass: rgba(8,6,3,0.92);
        }

        /* ══ ЯЗЫК RU/KZ ══ */
        .lang-kk { display: none; }
        body.kz-mode .lang-ru { display: none; }
        body.kz-mode .lang-kk { display: block; }

        /* ТЕХНИЧЕСКИЙ ФИКС СКРОЛЛА */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { background: var(--dark); color: var(--cream); font-family: 'Cormorant Garamond', serif; overflow-x: hidden; width: 100%; -webkit-overflow-scrolling: touch; }
        body { padding-bottom: 130px; }
        
        /* СТАТИЧНЫЙ ФОН */
        body::before {
            content: ""; position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 30%, rgba(201,168,76,0.03) 0%, transparent 70%);
            pointer-events: none;
        }

        /* ══ HEADER ══ */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px 20px; background: rgba(5,4,3,0.95); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 200; border-bottom: 1px solid rgba(201,168,76,0.12);
        }
        .logo-small { font-family: 'Cinzel', serif; font-size: 0.9rem; letter-spacing: 4px; color: var(--gold-light); text-decoration: none; }
        .back-btn { color: var(--gold); text-decoration: none; font-size: 0.75rem; letter-spacing: 2px; font-family: 'Cinzel', serif; }

        .hero { padding: 32px 20px 24px; text-align: center; }
        .hero h1 { font-family: 'Cinzel', serif; font-size: 2.2rem; color: var(--gold); letter-spacing: 4px; font-weight: 400; }

        .section { padding: 10px 14px; max-width: 1100px; margin: 0 auto; }

        /* ══ КАРТОЧКА ТОВАРА ══ */
        .product-card {
            background: var(--dark-2); border: 1px solid rgba(201,168,76,0.15);
            border-radius: 24px; overflow: hidden; margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
        }

        .carousel-box { position: relative; width: 100%; height: 450px; background: #000; overflow: hidden; }
        
        .track {
            display: flex; width: 100%; height: 100%; overflow-x: auto; 
            scroll-snap-type: x mandatory; scrollbar-width: none;
            touch-action: pan-x pan-y; -webkit-overflow-scrolling: touch;
            overscroll-behavior-x: contain;
        }
        .track::-webkit-scrollbar { display: none; }

        .slide { min-width: 100%; height: 100%; scroll-snap-align: start; flex-shrink: 0; touch-action: pan-x pan-y; }
        
        /* contain для полной видимости */
        .slide img { width: 100%; height: 100%; object-fit: contain; display: block; pointer-events: none; user-select: none; }

        .dots { display: flex; justify-content: center; gap: 6px; padding: 12px 0; background: var(--dark-2); }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(201, 168, 76, 0.2); transition: 0.3s; }
        .dot.active { background: var(--gold); width: 18px; border-radius: 3px; }

        .info { padding: 20px; text-align: center; }
        .info h3 { font-family: 'Cinzel', serif; font-size: 1.3rem; color: var(--cream); margin-bottom: 10px; font-weight: 400; }
        .price { font-family: 'Cinzel', serif; color: var(--gold-light); font-size: 1.6rem; font-weight: 600; margin-bottom: 18px; }

        .desc-btn { background: none; border: 1px solid rgba(201,168,76,0.25); color: var(--gold); width: 100%; padding: 12px; border-radius: 12px; font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 2px; cursor: pointer; margin-bottom: 12px; }
        .desc-content { display: none; text-align: left; font-size: 0.95rem; color: rgba(240,232,213,0.7); line-height: 1.7; padding: 14px 4px; border-top: 1px solid rgba(201,168,76,0.1); margin-bottom: 14px; }

        .wa-btn {
            display: block; background: linear-gradient(135deg, #c9a84c 0%, #8a6a1e 100%);
            color: #000; padding: 18px; border-radius: 14px; text-decoration: none; text-align: center;
            font-family: 'Cinzel', serif; font-weight: 900; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase;
        }

        /* ══ NAV DOCK ══ */
        .nav-dock {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 40px); max-width: 380px; height: 70px;
            background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.07);
            border-radius: 36px; display: flex; justify-content: space-around; align-items: center; z-index: 8000;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
        }
        .nav-link { text-decoration: none; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 3px; min-width: 56px; }
        .nav-icon { font-size: 1.4rem; display: block; }
        .nav-label { font-size: 0.45rem; letter-spacing: 1.5px; color: var(--gold); text-transform: uppercase; font-family: 'Cinzel', serif; font-weight: bold; }
        .nav-link.active .nav-icon { filter: drop-shadow(0 0 8px var(--gold)); }

        /* ══ STORY VIEWER ══ */
        #story-viewer { display: none; position: fixed; inset: 0; background: #000; z-index: 9000; flex-direction: column; }
        .story-progress { position: absolute; top: 14px; left: 10px; right: 10px; display: flex; gap: 4px; z-index: 9002; }
        .story-bar { height: 2px; flex: 1; background: rgba(255,255,255,0.25); border-radius: 2px; }
        .story-fill { height: 100%; width: 0%; background: #fff; transition: width 0.15s; }
        .close-story { position: absolute; top: 34px; right: 18px; width: 40px; height: 40px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #fff; font-size: 24px; z-index: 9003; cursor: pointer; }
        .story-track { display: flex; width: 100%; height: 100%; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; touch-action: pan-x; }
        .story-slide { min-width: 100%; height: 100%; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; }
        .story-slide img { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body id="mainBody">

<header>
    <a href="index.html" class="logo-small">MUSLIM SHOP</a>
    <a href="index.html" class="back-btn"><span class="lang-ru">← НАЗАД</span><span class="lang-kk">← АРТҚА</span></a>
</header>

<section class="hero"><h1>Nutraxin</h1></section>

<section class="section" id="product-list"></section>

<nav class="nav-dock">
    <a href="index.html" class="nav-link"><span class="nav-icon">🏠</span><span class="nav-label"><span class="lang-ru">Дом</span><span class="lang-kk">Үй</span></span></a>
    <a href="hits.html" class="nav-link"><span class="nav-icon">✨</span><span class="nav-label"><span class="lang-ru">Хиты</span><span class="lang-kk">Хиттер</span></span></a>
    <a href="tel:+77781754241" class="nav-link"><span class="nav-icon">📞</span><span class="nav-label"><span class="lang-ru">Связь</span><span class="lang-kk">Байланыс</span></span></a>
    <a href="https://wa.me/77781754241" class="nav-link"><span class="nav-icon">💬</span><span class="nav-label"><span class="lang-ru">Заказ</span><span class="lang-kk">Тапсырыс</span></span></a>
</nav>

<div id="story-viewer"><div class="story-progress" id="story-progress"></div><div class="close-story" onclick="closeStory()">×</div><div class="story-track" id="story-track"></div></div>

<script>
window.addEventListener('DOMContentLoaded', function() {
    if (localStorage.getItem('preferredLang') === 'kz') {
        document.getElementById('mainBody').classList.add('kz-mode');
    }
});

const products = [
    { 
        name: "Nutraxin Multivitamin (Women)", 
        price: "7 500 ₸", 
        prefix: "nutw", 
        desc: "Премиальный витаминно-минеральный комплекс, разработанный специально для женского организма. Содержит полный спектр необходимых микроэлементов для поддержания красоты и здоровья. <br>• <b>Энергия:</b> Борется с хронической усталостью и стрессом. <br>• <b>Красота:</b> Укрепляет волосы, кожу и ногти. <br>• <b>Баланс:</b> Поддерживает иммунитет и гормональный фон. <br>• <b>Качество:</b> Соответствует международным стандартам GMP.",
        desc_kk: "Әйел ағзасына арнайы әзірленген премиум дәрумен-минерал кешені. Сұлулық пен денсаулықты сақтауға қажетті микроэлементтердің толық спектрін қамтиды. <br>• <b>Энергия:</b> Созылмалы шаршау мен стреске қарсы күреседі. <br>• <b>Сұлулық:</b> Шашты, теріні және тырнақты нығайтады. <br>• <b>Тепе-теңдік:</b> Иммунитет пен гормоналды деңгейді қолдайды. <br>• <b>Сапа:</b> Халықаралық GMP стандарттарына сай келеді."
    },
    { 
        name: "Nutraxin Multivitamin (Men)", 
        price: "7 500 ₸", 
        prefix: "nutm", 
        desc: "Сбалансированная формула для активных мужчин. Комплекс разработан с учетом высоких физических и умственных нагрузок. <br>• <b>Сила:</b> Повышает выносливость и мышечный тонус. <br>• <b>Защита:</b> Укрепляет иммунную и сердечно-сосудистую системы. <br>• <b>Мужское здоровье:</b> Поддерживает мужскую фертильность и общий жизненный тонус. <br>• Произведено из высококачественного сырья с гарантией чистоты состава.",
        desc_kk: "Белсенді ерлерге арналған теңгерімді формула. Кешен жоғары физикалық және ақыл-ой жүктемелерін ескере отырып әзірленген. <br>• <b>Күш:</b> Төзімділік пен бұлшықет тонусын арттырады. <br>• <b>Қорғаныс:</b> Иммундық және жүрек-қантамыр жүйелерін нығайтады. <br>• <b>Ерлер денсаулығы:</b> Ерлердің құнарлылығы мен жалпы тіршілік тонусын қолдайды. <br>• Құрамының тазалығына кепілдік берілген жоғары сапалы шикізаттан жасалған."
    }
];

const list = document.getElementById('product-list');

products.forEach((p) => {
    const images = [1,2,3,4,5].map(i => `${p.prefix}_${i}.jpg`);
    const card = document.createElement('div');
    card.className = 'product-card';
    card.innerHTML = `
        <div class="carousel-box"><div class="track">
            ${images.map((img, idx) => `<div class="slide" onclick='openStory(${JSON.stringify(images)}, ${idx})'><img src="${img}" onerror="if(this.dataset.tried)this.parentElement.style.display='none';this.dataset.tried=1;this.src='placeholder.jpg';"></div>`).join('')}
        </div></div>
        <div class="dots">${images.map((_, i) => `<div class="dot${i===0?' active':''}"></div>`).join('')}</div>
        <div class="info">
            <h3>${p.name}</h3><div class="price">${p.price}</div>
            <button class="desc-btn">
                <span class="state-more">
                    <span class="lang-ru">ПОДРОБНЕЕ ▾</span><span class="lang-kk">ТОЛЫҒЫРАҚ ▾</span>
                </span>
                <span class="state-less" style="display:none">
                    <span class="lang-ru">СВЕРНУТЬ ▴</span><span class="lang-kk">ЖАБУ ▴</span>
                </span>
            </button>
            <div class="desc-content"><p class="lang-ru">${p.desc}</p><p class="lang-kk">${p.desc_kk}</p></div>
            <a href="https://wa.me/77781754241?text=${encodeURIComponent('Ассалямуалейкум! Я хочу заказать витамины Nutraxin: ' + p.name)}" class="wa-btn">ЗАКАЗАТЬ</a>
        </div>`;

    list.appendChild(card);
    const track = card.querySelector('.track');
    const dots = card.querySelectorAll('.dot');
    track.addEventListener('scroll', () => {
        const i = Math.round(track.scrollLeft / track.offsetWidth);
        dots.forEach((d, n) => d.classList.toggle('active', n === i));
    }, { passive: true });
    const btn = card.querySelector('.desc-btn');
    const content = card.querySelector('.desc-content');
    const stateMore = card.querySelector('.state-more');
    const stateLess = card.querySelector('.state-less');
    btn.addEventListener('click', () => {
        const open = content.style.display === 'block';
        content.style.display = open ? 'none' : 'block';
        stateMore.style.display = open ? 'inline' : 'none';
        stateLess.style.display = open ? 'none' : 'inline';
    });
});

const viewer = document.getElementById('story-viewer');
const storyTrack = document.getElementById('story-track');
let startY = 0;

function openStory(images, start) {
    storyTrack.innerHTML = ''; document.getElementById('story-progress').innerHTML = '';
    images.forEach(src => {
        const s = document.createElement('div'); s.className = 'story-slide';
        s.innerHTML = `<img src="${src}">`; storyTrack.appendChild(s);
        const b = document.createElement('div'); b.className = 'story-bar';
        b.innerHTML = `<div class="story-fill"></div>`; document.getElementById('story-progress').appendChild(b);
    });
    viewer.style.display = 'flex'; document.body.style.overflow = 'hidden';
    setTimeout(() => { storyTrack.scrollLeft = storyTrack.offsetWidth * start; updateStory(); }, 50);
}

function updateStory() {
    const index = Math.round(storyTrack.scrollLeft / storyTrack.offsetWidth);
    document.querySelectorAll('.story-fill').forEach((f, i) => {
        f.style.width = i <= index ? '100%' : '0%';
        f.style.opacity = i === index ? '1' : (i < index ? '0.6' : '0.3');
    });
}

storyTrack.addEventListener('scroll', updateStory, { passive: true });
function closeStory() { viewer.style.display = 'none'; document.body.style.overflow = ''; }
viewer.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
viewer.addEventListener('touchend', e => { if (e.changedTouches[0].clientY - startY > 80) closeStory(); }, { passive: true });
</script>
</body>
</html>
