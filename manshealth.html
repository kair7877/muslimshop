<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мужское здоровье | Muslim Shop Luxury</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c9a84c; --gold-light: #e8c96a; --dark: #050403; --dark-2: #0d0b08; --cream: #f0e8d5; --glass: rgba(8,6,3,0.92); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { background: var(--dark); color: var(--cream); font-family: 'Cormorant Garamond', serif; overflow-x: hidden; width: 100%; -webkit-overflow-scrolling: touch; }
        body { padding-bottom: 130px; }
        body::before { content: ""; position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 30%, rgba(201,168,76,0.03) 0%, transparent 70%); pointer-events: none; }

        /* Логика отображения языков (переключатель только на главной, здесь язык применяется автоматически из localStorage) */
        .lang-kk { display: none; }
        body.kz-mode .lang-ru { display: none; }
        body.kz-mode .lang-kk { display: block; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; background: rgba(5,4,3,0.95); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 200; border-bottom: 1px solid rgba(201,168,76,0.12); }
        .logo-small { font-family: 'Cinzel', serif; font-size: 0.9rem; letter-spacing: 4px; color: var(--gold-light); text-decoration: none; }
        .back-btn { color: var(--gold); text-decoration: none; font-size: 0.75rem; letter-spacing: 2px; font-family: 'Cinzel', serif; }
        .hero { padding: 32px 20px 24px; text-align: center; }
        .hero h1 { font-family: 'Cinzel', serif; font-size: 2.2rem; color: var(--gold); letter-spacing: 4px; }
        .section { padding: 10px 14px; max-width: 1100px; margin: 0 auto; }
        .product-card { background: var(--dark-2); border: 1px solid rgba(201,168,76,0.15); border-radius: 24px; overflow: hidden; margin-bottom: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
        .carousel-box { position: relative; width: 100%; height: 450px; background: #000; overflow: hidden; }
        .track { display: flex; width: 100%; height: 100%; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; touch-action: pan-x pan-y; -webkit-overflow-scrolling: touch; overscroll-behavior-x: contain; }
        .track::-webkit-scrollbar { display: none; }
        .slide { min-width: 100%; height: 100%; scroll-snap-align: start; flex-shrink: 0; touch-action: pan-x pan-y; }
        .slide img { width: 100%; height: 100%; object-fit: contain; display: block; pointer-events: none; }
        .dots { display: flex; justify-content: center; gap: 6px; padding: 12px 0; background: var(--dark-2); }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(201, 168, 76, 0.2); transition: 0.3s; }
        .dot.active { background: var(--gold); width: 18px; border-radius: 3px; }
        .info { padding: 20px; text-align: center; }
        .info h3 { font-family: 'Cinzel', serif; font-size: 1.2rem; color: var(--cream); margin-bottom: 8px; font-weight: 400; }
        .price { font-family: 'Cinzel', serif; color: var(--gold-light); font-size: 1.6rem; font-weight: 600; margin-bottom: 18px; }
        .desc-btn { background: none; border: 1px solid rgba(201,168,76,0.25); color: var(--gold); width: 100%; padding: 12px; border-radius: 12px; font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 2px; cursor: pointer; margin-bottom: 12px; }
        .desc-content { display: none; text-align: left; font-size: 0.95rem; color: rgba(240,232,213,0.7); line-height: 1.7; padding: 14px 4px; border-top: 1px solid rgba(201,168,76,0.1); margin-bottom: 14px; }
        .wa-btn { display: block; background: linear-gradient(135deg, #c9a84c 0%, #8a6a1e 100%); color: #000; padding: 18px; border-radius: 14px; text-decoration: none; text-align: center; font-family: 'Cinzel', serif; font-weight: 900; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; }
        .nav-dock { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); max-width: 380px; height: 70px; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.07); border-radius: 36px; display: flex; justify-content: space-around; align-items: center; z-index: 8000; box-shadow: 0 20px 60px rgba(0,0,0,0.9); }
        .nav-link { text-decoration: none; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .nav-icon { font-size: 1.4rem; }
        .nav-label { font-size: 0.45rem; letter-spacing: 1.5px; color: var(--gold); text-transform: uppercase; font-family: 'Cinzel', serif; font-weight: bold; }
        #story-viewer { display: none; position: fixed; inset: 0; background: #000; z-index: 9000; flex-direction: column; }
        .story-progress { position: absolute; top: 14px; left: 10px; right: 10px; display: flex; gap: 4px; }
        .story-bar { height: 2px; flex: 1; background: rgba(255,255,255,0.25); border-radius: 2px; }
        .story-fill { height: 100%; width: 0%; background: #fff; transition: width 0.15s; }
        .close-story { position: absolute; top: 34px; right: 18px; width: 40px; height: 40px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #fff; font-size: 24px; z-index: 9003; cursor: pointer; }
        .story-track { display: flex; width: 100%; height: 100%; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; touch-action: pan-x; }
        .story-slide { min-width: 100%; height: 100%; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; }
        .story-slide img { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body id="mainBody">
    <header>
        <a href="index.html" class="logo-small">MUSLIM SHOP</a>

    <section class="hero">

    <section class="section" id="product-list"></section>
    <nav class="nav-dock">
        <a href="index.html" class="nav-link"><span class="nav-icon">🏠</span><span class="nav-label"><span class="lang-ru">Дом</span><span class="lang-kk">Басты</span></span></a>
        <a href="hits.html" class="nav-link"><span class="nav-icon">✨</span><span class="nav-label"><span class="lang-ru">Хиты</span><span class="lang-kk">Хиттер</span></span></a>
        <a href="tel:+77781754241" class="nav-link"><span class="nav-icon">📞</span><span class="nav-label"><span class="lang-ru">Связь</span><span class="lang-kk">Байланыс</span></span></a>
        <a href="https://wa.me/77781754241" class="nav-link"><span class="nav-icon">💬</span><span class="nav-label"><span class="lang-ru">Заказ</span><span class="lang-kk">Тапсырыс</span></span></a>

    <div id="story-viewer"><div class="story-progress" id="story-progress"></div><div class="close-story" onclick="closeStory()">×</div><div class="story-track" id="story-track"></div></div>

    <script>
    const products = [
        { name: "Паста THEMRA", name_kk: "THEMRA пастасы", price: "4 000 ₸", prefix: "themra",
          desc: "Легендарная эпимедиумная паста. Усиливает либидо, повышает выносливость и тонус.",
          desc_kk: "Аңызға айналған эпимедиум пастасы. Либидоны күшейтеді, төзімділік пен тонусты арттырады." },
        { name: "Супер Теке — паста", name_kk: "Супер Теке пастасы", price: "5 000 ₸", prefix: "teke",
          desc: "Усиленная формула с высокой концентрацией эпимедиума и женьшеня.",
          desc_kk: "Эпимедиум мен женьшеньнің жоғары концентрациясы бар күшейтілген формула." },
        { name: "Sidra MAXIMUM POWER", name_kk: "Sidra MAXIMUM POWER", price: "8 000 ₸", prefix: "sidramax",
          desc: "Премиальное средство для тестостерона и либидо. Максимальный результат.",
          desc_kk: "Тестостерон мен либидоға арналған премиум құрал. Ең жоғары нәтиже." },
        { name: "Men's Bio Honey", name_kk: "Men's Bio Honey", price: "2 500 ₸", prefix: "biohoney",
          desc: "Малазийский мёд с корнем Тонгкат Али для мгновенной бодрости.",
          desc_kk: "Лездік сергектік үшін Тонгкат Али тамыры қосылған малайзиялық бал." },
        { name: "BIO HERBS Royal Honey", name_kk: "BIO HERBS Royal Honey", price: "2 500 ₸", prefix: "bioherbs",
          desc: "Королевский мёд в саше. Эффект сохраняется до 48 часов.",
          desc_kk: "Пакетшедегі патша балы. Әсері 48 сағатқа дейін сақталады." },
        { name: "Пилюли «Мужская сила»", name_kk: "«Ер қуаты» пилюльдері", price: "7 000 ₸", prefix: "pills",
          desc: "Традиционный комплекс на основе женьшеня и пантов марала.",
          desc_kk: "Женьшень мен марал мүйізі негізіндегі дәстүрлі кешен." },
        { name: "Набор для мужской силы", name_kk: "Ер қуатына арналған жинақ", price: "1 000 - 1 500 ₸", prefix: "menset",
          desc: "Пробный сет из самых популярных позиций нашего магазина.",
          desc_kk: "Дүкенімізідің ең танымал тауарларынан жасалған сынама жинақ." },
        { name: "Big PENIS — стимулятор", name_kk: "Big PENIS — стимулятор", price: "2 000 ₸", prefix: "bigpenis",
          desc: "Препарат быстрого действия для уверенности и контроля.",
          desc_kk: "Сенімділік пен бақылауға арналған тез әсер ететін препарат." },
        { name: "GOLD 07 — Паста", name_kk: "GOLD 07 — паста", price: "5 500 ₸", prefix: "gold07",
          desc: "Турецкая медовая паста высокого очищения для бодрости на весь день.",
          desc_kk: "Күні бойы сергектік үшін жоғары тазартылған түрік бал пастасы." },
        { name: "Золотой Олень", name_kk: "Алтын Бұғы", price: "4 000 ₸", prefix: "deer",
          desc: "Классика тибетской медицины в шариках для укрепления почек.",
          desc_kk: "Бүйректі нығайтуға арналған шарик түріндегі тибет медицинасының классикасы." },
        { name: "Паста Super Power", name_kk: "Super Power пастасы", price: "10 000 ₸", prefix: "spower",
          desc: "Максимальная концентрация трав. Самый мощный состав в линейке.",
          desc_kk: "Шөптердің ең жоғары концентрациясы. Желідегі ең күшті құрам." },
        { name: "Maral Gel", name_kk: "Maral Gel", price: "3 000 ₸", prefix: "maral",
          desc: "Гель для наружного применения на основе корня марала.",
          desc_kk: "Марал тамыры негізіндегі сыртқа қолдануға арналған гель." },
        { name: "Мужская сила Arabiyan Med", name_kk: "Arabiyan Med ер қуаты", price: "6 000 ₸", prefix: "amed",
          desc: "Травяной сбор в капсулах 100% BIO с цинком и селеном.",
          desc_kk: "Мырыш пен селен қосылған капсулалардағы 100% BIO шөп жинағы." },
        { name: "Fraink Cream", name_kk: "Fraink Cream", price: "2 500 ₸", prefix: "fraink",
          desc: "Крем-пролонгатор для значительного продления близости.",
          desc_kk: "Жақындықты айтарлықтай ұзартуға арналған пролонгатор-крем." },
        { name: "Сокровище для почек", name_kk: "Бүйрек қазынасы", price: "4 000 ₸", prefix: "kidney",
          desc: "Китайский препарат для восполнения жизненной энергии.",
          desc_kk: "Өмірлік энергияны толықтыруға арналған қытай препараты." },
        { name: "Africa Black Ant King", name_kk: "Africa Black Ant King", price: "4 000 ₸", prefix: "ant",
          desc: "Знаменитый 'Черный муравей'. Действие через 15-20 минут.",
          desc_kk: "Әйгілі 'Қара құмырсқа'. Әсері 15-20 минуттан кейін басталады." },
        { name: "Sealex Forte", name_kk: "Sealex Forte", price: "4 000 ₸", prefix: "sealex",
          desc: "Натуральная добавка для притока крови. Не вызывает привыкания.",
          desc_kk: "Қан ағымын жақсартатын табиғи қоспа. Тәуелділік тудырмайды." },
        { name: "Снайпер", name_kk: "Снайпер", price: "4 000 ₸", prefix: "sniper",
          desc: "Точечный стимулятор в таблетках для быстрого восстановления.",
          desc_kk: "Тез қалпына келу үшін таблеткадағы нүктелік стимулятор." }
    ];
    const list = document.getElementById('product-list');
    products.forEach(p => {
        const images = [1,2,3,4,5].map(i => `${p.prefix}_${i}.jpg`);
        const card = document.createElement('div'); card.className = 'product-card';
        card.innerHTML = `<div class="carousel-box"><div class="track">${images.map((img, idx) => `<div class="slide" onclick='openStory(${JSON.stringify(images)}, ${idx})'><img src="${img}" onerror="if(this.dataset.tried)this.parentElement.style.display='none';this.dataset.tried=1;this.src='placeholder.jpg';"></div>`).join('')}</div></div><div class="dots">${images.map((_, i) => `<div class="dot${i===0?' active':''}"></div>`).join('')}</div><div class="info"><h3><span class="lang-ru">${p.name}</span><span class="lang-kk">${p.name_kk}</span></h3><div class="price">${p.price}</div><button class="desc-btn"><span class="state-more"><span class="lang-ru">ПОДРОБНЕЕ ▾</span><span class="lang-kk">ТОЛЫҒЫРАҚ ▾</span></span><span class="state-less" style="display:none"><span class="lang-ru">СВЕРНУТЬ ▴</span><span class="lang-kk">ЖАБУ ▴</span></span></button><div class="desc-content"><p class="lang-ru">${p.desc}</p><p class="lang-kk">${p.desc_kk}</p></div><a href="https://wa.me/77781754241?text=${encodeURIComponent('Ассалямуалейкум! Я хочу заказать: ' + p.name)}" class="wa-btn"><span class="lang-ru">ЗАКАЗАТЬ</span><span class="lang-kk">ТАПСЫРЫС БЕРУ</span></a></div>`;
        list.appendChild(card);
        const track = card.querySelector('.track'); const dots = card.querySelectorAll('.dot');
        track.addEventListener('scroll', () => { const i = Math.round(track.scrollLeft / track.offsetWidth); dots.forEach((d, n) => d.classList.toggle('active', n === i)); }, { passive: true });
        const btn = card.querySelector('.desc-btn'); const content = card.querySelector('.desc-content');
        const stateMore = btn.querySelector('.state-more'); const stateLess = btn.querySelector('.state-less');
        btn.addEventListener('click', () => {
            const open = content.style.display === 'block';
            content.style.display = open ? 'none' : 'block';
            stateMore.style.display = open ? 'block' : 'none';
            stateLess.style.display = open ? 'none' : 'block';
        });
    });
    const viewer = document.getElementById('story-viewer'); const storyTrack = document.getElementById('story-track'); let startY = 0;
    function openStory(images, start) {
        storyTrack.innerHTML = ''; document.getElementById('story-progress').innerHTML = '';
        images.forEach(src => {
            const s = document.createElement('div'); s.className = 'story-slide'; s.innerHTML = `<img src="${src}">`; storyTrack.appendChild(s);
            const b = document.createElement('div'); b.className = 'story-bar'; b.innerHTML = `<div class="story-fill"></div>`; document.getElementById('story-progress').appendChild(b);
        });
        viewer.style.display = 'flex'; document.body.style.overflow = 'hidden';
        setTimeout(() => { storyTrack.scrollLeft = storyTrack.offsetWidth * start; updateStory(); }, 50);
    }
    function updateStory() { const index = Math.round(storyTrack.scrollLeft / storyTrack.offsetWidth); document.querySelectorAll('.story-fill').forEach((f, i) => { f.style.width = i <= index ? '100%' : '0%'; f.style.opacity = i === index ? '1' : (i < index ? '0.6' : '0.3'); }); }
    storyTrack.addEventListener('scroll', updateStory, { passive: true });
    function closeStory() { viewer.style.display = 'none'; document.body.style.overflow = ''; }
    viewer.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
    viewer.addEventListener('touchend', e => { if (e.changedTouches[0].clientY - startY > 80) closeStory(); }, { passive: true });

    // ПРИМЕНЯЕМ ЯЗЫК, ВЫБРАННЫЙ РАНЕЕ НА ГЛАВНОЙ СТРАНИЦЕ
    window.addEventListener('DOMContentLoaded', function() {
        if (localStorage.getItem('preferredLang') === 'kz') {
            document.getElementById('mainBody').classList.add('kz-mode');
        }
    });
    </script>
</body>
</html>
