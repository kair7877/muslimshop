<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мужское здоровье | Muslim Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&amp;family=Tenor+Sans&amp;display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c; --gold-light: #e8c96a; --dark: #0a0805;
            --dark-2: #120e08; --cream: #f5efe0; --text: #e8dfc8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--dark); 
            color: var(--text); 
            font-family: 'Tenor Sans', sans-serif; 
            line-height: 1.6; 
            overflow-x: hidden; 
            width: 100%;
        }

        header {
            padding: 1.2rem 1.5rem; display: flex; justify-content: space-between; align-items: center;
            background: rgba(10,8,5,0.95); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(201,168,76,0.1);
        }
        .logo { font-family: 'Cinzel', serif; font-size: 1.1rem; color: var(--gold-light); letter-spacing: 2px; text-decoration: none; }
        .hero { padding: 3rem 1.5rem 1rem; text-align: center; }
        .hero h1 { font-family: 'Cinzel', serif; font-size: 2.2rem; color: var(--cream); letter-spacing: 2px; }
        
        .section { max-width: 1100px; margin: 0 auto; padding: 1rem; }

        .product-card {
            background: var(--dark-2); border: 1px solid rgba(201,168,76,0.2);
            border-radius: 24px; overflow: hidden; margin-bottom: 3.5rem;
            display: flex; flex-direction: column; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .carousel-box { 
            position: relative; width: 100%; height: 500px; background: #000; overflow: hidden;
            touch-action: pan-y; /* Важно для мгновенного скролла страницы */
        }
        
        .carousel-box::after {
            content: ''; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(201,168,76,0.05), transparent);
            transform: skewX(-25deg); animation: shimmer 8s infinite; pointer-events: none;
        }
        @keyframes shimmer { 0% { left: -150%; } 20% { left: 150%; } 100% { left: 150%; } }
        
        .track { 
            display: flex; width: 100%; height: 100%; overflow-x: auto; 
            scroll-snap-type: x mandatory; scrollbar-width: none;
            touch-action: pan-x pan-y; /* Позволяет и карусель листать, и страницу */
        }
        .track::-webkit-scrollbar { display: none; }
        
        .slide { min-width: 100%; height: 100%; scroll-snap-align: start; }
        .slide img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .dots { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 18px 0; background: var(--dark-2); }
        .dot { width: 7px; height: 7px; background: rgba(201, 168, 76, 0.2); border-radius: 50%; transition: 0.3s; }
        .dot.active { background: var(--gold); width: 18px; border-radius: 10px; }

        .info { padding: 10px 20px 30px; text-align: center; background: var(--dark-2); }
        .info h3 { font-family: 'Cinzel', serif; font-size: 1.4rem; color: var(--cream); margin-bottom: 10px; }
        .price { color: var(--gold-light); font-weight: 700; font-size: 1.8rem; margin-bottom: 25px; }
        
        /* КНОПКА ПОДРОБНЕЕ */
        .desc-btn {
            background: none; border: 1px solid rgba(201,168,76,0.3); color: var(--gold);
            width: 100%; padding: 12px; border-radius: 12px; font-family: 'Cinzel', serif;
            font-size: 0.75rem; letter-spacing: 1px; cursor: pointer; margin-bottom: 15px;
        }
        .desc-content { 
            display: none; text-align: left; font-size: 0.85rem; color: rgba(232,223,200,0.7); 
            line-height: 1.6; padding: 15px 5px; border-top: 1px solid rgba(201,168,76,0.1); margin-bottom: 15px; 
        }
        .desc-content b { color: var(--gold-light); }

        .wa-btn {
            display: block; background: linear-gradient(135deg, var(--gold), #8a6a1e); color: var(--dark); 
            padding: 18px; border-radius: 12px; text-decoration: none; text-align: center; 
            font-weight: 800; font-size: 1rem; text-transform: uppercase;
        }

        /* STORY VIEWER */
        #story-viewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; flex-direction: column; }
        .story-progress { position: absolute; top: 15px; left: 10px; right: 10px; display: flex; gap: 5px; z-index: 3002; }
        .story-bar { height: 3px; flex: 1; background: rgba(255,255,255,0.3); border-radius: 2px; }
        .story-fill { height: 100%; width: 0%; background: #fff; }
        .close-story { position: absolute; top: 35px; right: 20px; width: 44px; height: 44px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #fff; font-size: 30px; z-index: 3003; }
        .story-track { display: flex; width: 100%; height: 100%; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .story-slide { min-width: 100%; height: 100%; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; }
        .story-slide img { width: 100%; height: 100%; object-fit: contain; }

        .back { text-align: center; margin: 3rem 0; }
        .back a { color: var(--gold); text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">MUSLIM SHOP</a>
    <a href="index.html" style="color: var(--gold); text-decoration: none;">← Главная</a>
</header>

<section class="hero"><h1>Мужское здоровье</h1></section>

<section class="section" id="product-list"></section>

<div class="back"><a href="index.html">← ВЕРНУТЬСЯ НА ГЛАВНУЮ</a></div>

<div id="story-viewer">
    <div class="story-progress" id="story-progress"></div>
    <div class="close-story" onclick="closeStory()">&times;</div>
    <div class="story-track" id="story-track"></div>
</div>

<script>
    const products = [
        { 
            name: "Паста THEMRA", price: "4 000 ₸", prefix: "themra",
            desc: "<p><b>Themra</b> — легендарная эпимедиумная паста. Полностью натуральный состав на основе цветочного меда и комплекса трав.</p><p>• Усиливает либидо и потенцию;<br>• Продлевает половой акт;<br>• Повышает выносливость и тонус организма;<br>• Рекомендуется при занятиях спортом для энергии.</p>"
        },
        { 
            name: "Супер Теке — паста", price: "5 000 ₸", prefix: "teke",
            desc: "<p><b>Супер Теке</b> — усиленная формула для мужской силы. Содержит высокую концентрацию эпимедиума и женьшеня.</p><p>• Быстрый и мощный эффект;<br>• Улучшает кровообращение в малом тазу;<br>• Снимает физическую и ментальную усталость;<br>• 100% органический продукт.</p>"
        },
        { 
            name: "Sidra MAXIMUM POWER", price: "8 000 ₸", prefix: "sidramax",
            desc: "<p><b>Sidra Maximum Power</b> — премиальное средство для тех, кто ценит максимальный результат.</p><p>• Улучшает качество и подвижность сперматозоидов;<br>• Способствует естественной выработке тестостерона;<br>• Помогает при восстановлении после стрессов;<br>• Эффективна как для мужчин, так и для женщин (либидо).</p>"
        },
        { 
            name: "Men's Bio Honey", price: "2 500 ₸", prefix: "biohoney",
            desc: "<p>Малазийский мёд <b>Bio Honey</b> в удобных бутылочках. Мощный природный энергетик.</p><p>• Мгновенное действие (через 30-40 мин);<br>• Содержит корень Тонгкат Али и маточное молочко;<br>• Укрепляет иммунитет и мужскую силу;<br>• Удобно брать с собой.</p>"
        },
        { 
            name: "BIO HERBS Royal Honey", price: "2 500 ₸", prefix: "bioherbs",
            desc: "<p><b>Royal Honey</b> — королевский мёд в саше. Смесь элитного тропического мёда и целебных корней.</p><p>• Повышает сексуальное влечение;<br>• Укрепляет организм при регулярном приеме;<br>• Действует до 48 часов;<br>• Не содержит химии и вредных добавок.</p>"
        },
        { 
            name: "Пилюли «Мужская сила»", price: "7 000 ₸", prefix: "pills",
            desc: "<p>Традиционный комплекс в капсулах на основе женьшеня и пантов оленя.</p><p>• Глубокое тонизирующее действие;<br>• Улучшает работу почек и мочеполовой системы;<br>• Балансирует гормональный фон;<br>• Замедляет процессы старения.</p>"
        },
        { 
            name: "Набор для мужской силы", price: "1 000 - 1 500 ₸", prefix: "menset",
            desc: "<p>Пробный сет из самых популярных позиций нашего магазина.</p><p>• Позволяет попробовать разные виды паст и мёда;<br>• Идеально для первого знакомства с продукцией;<br>• Компактная упаковка.</p>"
        },
        { 
            name: "Big PENIS — стимулятор", price: "2 000 ₸", prefix: "bigpenis",
            desc: "<p>Сильнодействующий препарат для разового применения.</p><p>• Увеличивает время акта и уверенность;<br>• Эффект сохраняется до 72 часов;<br>• Совместим с небольшим количеством алкоголя;<br>• Только натуральные экстракты.</p>"
        },
        { 
            name: "GOLD 07 — Паста", price: "5 500 ₸", prefix: "gold07",
            desc: "<p><b>Gold 07</b> — турецкая медовая паста высокого очищения.</p><p>• Придает бодрость на весь день;<br>• Улучшает концентрацию и память;<br>• Мягкое, но стабильное действие на потенцию;<br>• Приятный вкус трав и мёда.</p>"
        },
        { 
            name: "Золотой Олень", price: "4 000 ₸", prefix: "deer",
            desc: "<p><b>Золотой Олень (Шенжун)</b> — классика тибетской медицины в шариках.</p><p>• Помогает при быстрой эякуляции;<br>• Улучшает работу предстательной железы;<br>• Рекомендуется при ломоте в пояснице и коленях;<br>• Накопительный лечебный эффект.</p>"
        },
        { 
            name: "Паста Super Power", price: "10 000 ₸", prefix: "spower",
            desc: "<p><b>Super Power</b> — паста максимальной концентрации в большой банке.</p><p>• Самый мощный состав в нашей линейке;<br>• Рекомендуется при серьезных нагрузках;<br>• Укрепляет мужское здоровье на клеточном уровне;<br>• Хватает на долгий курс.</p>"
        },
        { 
            name: "Maral Gel", price: "3 000 ₸", prefix: "maral",
            desc: "<p>Гель для наружного применения на основе корня марала.</p><p>• Улучшает кровоток и чувствительность;<br>• Безопасен для кожи, быстро впитывается;<br>• Можно использовать как смазку;<br>• Натуральные компоненты без липкости.</p>"
        },
        { 
            name: "Мужская сила Arabiyan Med", price: "6 000 ₸", prefix: "amed",
            desc: "<p>Сбор трав от <b>Arabiyan Med</b> в капсулах.</p><p>• Чистый органический продукт;<br>• Содержит цинк и селен для мужского здоровья;<br>• Помогает при простатите и воспалениях;<br>• Укрепляет мужской иммунитет.</p>"
        },
        { 
            name: "Fraink Cream", price: "2 500 ₸", prefix: "fraink",
            desc: "<p>Крем-пролонгатор для мужчин.</p><p>• Позволяет значительно продлить время близости;<br>• Снижает чрезмерную чувствительность;<br>• Натуральный состав, не вызывает аллергии;<br>• Экономичный расход.</p>"
        },
        { 
            name: "Сокровище для почек", price: "4 000 ₸", prefix: "kidney",
            desc: "<p>Китайский фитопрепарат для укрепления «мужской энергии» через здоровье почек.</p><p>• Убирает частые позывы в туалет;<br>• Снимает отеки и боли в пояснице;<br>• Повышает общую жизненную силу;<br>• Рекомендуется курсом.</p>"
        },
        { 
            name: "Africa Black Ant King", price: "4 000 ₸", prefix: "ant",
            desc: "<p>Знаменитый препарат <b>Черный Муравей</b>.</p><p>• Очень быстрое действие (15-20 мин);<br>• Твердая эрекция и контроль;<br>• Помогает даже при сильной усталости;<br>• Проверенное годами качество.</p>"
        },
        { 
            name: "Sealex Forte", price: "4 000 ₸", prefix: "sealex",
            desc: "<p>Биологически активная добавка на основе экстрактов коры йохимбе и женьшеня.</p><p>• Усиливает приток крови;<br>• Обостряет ощущения во время близости;<br>• Поддерживает тонус сосудов;<br>• Не вызывает привыкания.</p>"
        },
        { 
            name: "Снайпер", price: "4 000 ₸", prefix: "sniper",
            desc: "<p><b>Снайпер</b> — натуральный стимулятор в таблетках.</p><p>• Точечное действие на потенцию;<br>• Позволяет быстро восстановиться между актами;<br>• Содержит панты марала и дикие травы;<br>• Мягкое действие без давления.</p>"
        }
    ];

    const productList = document.getElementById('product-list');

    products.forEach((p, idx) => {
        const images = [`${p.prefix}_1.jpg`, `${p.prefix}_2.jpg`, `${p.prefix}_3.jpg`, `${p.prefix}_4.jpg`, `${p.prefix}_5.jpg`];
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
            <div class="carousel-box">
                <div class="track">
                    ${images.map((img, i) => `
                        <div class="slide"><img src="${img}" onclick='openStory(${JSON.stringify(images)}, ${i})' onerror="if(this.src.includes('_1')){this.src='placeholder.jpg'}else{this.parentElement.style.display='none';}"></div>
                    `).join('')}
                </div>
            </div>
            <div class="dots">${images.map((_, i) => `<div class="dot ${i===0?'active':''}"></div>`).join('')}</div>
            <div class="info">
                <h3>${p.name}</h3>
                <div class="price">${p.price}</div>
                <button class="desc-btn" onclick="toggleDesc(this)">ПОДРОБНЕЕ О ТОВАРЕ ▾</button>
                <div class="desc-content">${p.desc}</div>
                <a href="https://wa.me/77781754241?text=Ассаляму%20алейкум!%20Хочу%20заказать%20${encodeURIComponent(p.name)}" class="wa-btn">ЗАКАЗАТЬ</a>
            </div>
        `;
        productList.appendChild(card);
        const track = card.querySelector('.track');
        const dots = card.querySelectorAll('.dot');
        track.addEventListener('scroll', () => {
            const index = Math.round(track.scrollLeft / track.offsetWidth);
            dots.forEach((dot, i) => dot.classList.toggle('active', i === index));
        });
    });

    function toggleDesc(btn) {
        const content = btn.nextElementSibling;
        const isOpen = content.style.display === 'block';
        content.style.display = isOpen ? 'none' : 'block';
        btn.innerText = isOpen ? 'ПОДРОБНЕЕ О ТОВАРЕ ▾' : 'СВЕРНУТЬ ОПИСАНИЕ ▴';
    }

    const viewer = document.getElementById('story-viewer');
    const storyTrack = document.getElementById('story-track');
    const progressContainer = document.getElementById('story-progress');

    function openStory(images, startIndex) {
        storyTrack.innerHTML = ''; progressContainer.innerHTML = '';
        images.forEach((src) => {
            const slide = document.createElement('div'); slide.className = 'story-slide';
            slide.innerHTML = `<img src="${src}">`; storyTrack.appendChild(slide);
            const bar = document.createElement('div'); bar.className = 'story-bar';
            bar.innerHTML = `<div class="story-fill"></div>`; progressContainer.appendChild(bar);
        });
        viewer.style.display = 'flex'; document.body.style.overflow = 'hidden';
        setTimeout(() => { storyTrack.scrollLeft = storyTrack.offsetWidth * startIndex; updateStoryUI(); }, 50);
    }

    function updateStoryUI() {
        const index = Math.round(storyTrack.scrollLeft / storyTrack.offsetWidth);
        const fills = document.querySelectorAll('.story-fill');
        fills.forEach((fill, i) => {
            fill.style.width = i <= index ? '100%' : '0%';
            fill.style.opacity = i === index ? '1' : (i < index ? '0.6' : '0.3');
        });
    }

    storyTrack.addEventListener('scroll', updateStoryUI);
    function closeStory() { viewer.style.display = 'none'; document.body.style.overflow = 'auto'; }
</script>
</body>
</html>
